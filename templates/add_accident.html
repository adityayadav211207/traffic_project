<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Accident</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<div class="form-page">

    <div class="form-container">

        <h1>🚑 Add Accident Record</h1>
        <div class="top-actions">

    <a href="/dashboard"
       class="dashboard-btn">

       ← Dashboard

    </a>

</div>

        <form method="POST"
              enctype="multipart/form-data">

            <!-- LOCATION -->

            <input type="text"
                   name="location"
                   placeholder="Accident Location"
                   required>

            <!-- LATITUDE -->

            <input type="text"
                   name="latitude"
                   placeholder="Latitude (Example: 28.7041)"
                   required>

            <!-- LONGITUDE -->

            <input type="text"
                   name="longitude"
                   placeholder="Longitude (Example: 77.1025)"
                   required>

            <!-- SEVERITY -->

            <select name="severity"
                    required>

                <option value="">
                    Select Severity
                </option>

                <option>Minor</option>

                <option>Major</option>

                <option>Critical</option>

            </select>

            <!-- CASUALTIES -->

            <input type="number"
                   name="casualties"
                   placeholder="Number of Casualties"
                   required>

            <!-- REASON -->

            <textarea
                name="reason"
                placeholder="Reason of Accident"
                required></textarea>

            <!-- IMAGE UPLOAD -->

            <label class="upload-label">

                Upload Accident Evidence

            </label>

            <input type="file"
                   name="evidence"
                   accept="image/*">

            <!-- SUBMIT BUTTON -->

            <button type="submit">

                Add Accident

            </button>

        </form>

    </div>

</div>

</body>
</html>
