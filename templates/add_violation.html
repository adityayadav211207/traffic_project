<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Violation</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="form-page">

    <div class="form-container">

        <h1>🚓 Add Traffic Violation</h1>
        <div class="top-actions">

    <a href="/dashboard"
       class="dashboard-btn">

       ← Dashboard

    </a>

</div>

        <form method="POST">

            <input type="text"
                   name="vehicle_no"
                   placeholder="Vehicle Number"
                   required>

            <input type="text"
                   name="driver_name"
                   placeholder="Driver Name"
                   required>

            <select name="violation_type" required>

                <option value="">
                    Select Violation Type
                </option>

                <option>No Helmet</option>

                <option>Signal Jump</option>

                <option>Overspeeding</option>

                <option>Wrong Parking</option>

            </select>

            <input type="number"
                   name="fine"
                   placeholder="Fine Amount"
                   required>

            <input type="text"
                   name="location"
                   placeholder="Location"
                   required>

            <button type="submit">
                Add Violation
            </button>

        </form>

    </div>

</div>

</body>
</html>
