<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="login-box">

        <h1>👮 Admin Login</h1>

        <p>

            TrafficVision Admin Access

        </p>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Admin Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</div>

</body>
</html>
